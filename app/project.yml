name: TodayTimetable
options:
  bundleIdPrefix: com.todayschooltimetable
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: H6LS98UJ32

packages:
  KakaoOpenSDK:
    url: https://github.com/kakao/kakao-ios-sdk
    from: "2.20.0"
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"

targets:
  TodayTimetable:
    type: application
    platform: iOS
    sources:
      - TodayTimetable
      - path: TodayTimetableLiveActivity/TimetableActivityAttributes.swift
        buildPhase: sources
      - path: TodayTimetableLiveActivity/FocusActivityAttributes.swift
        buildPhase: sources
    dependencies:
      - target: TodayTimetableWatch
      - target: TodayTimetableLiveActivityExtension
      - target: TodayTimetableWidgetExtension
      - target: TodayTimetableShareExtension
      - target: TodayTimetableNotificationServiceExtension
      - package: KakaoOpenSDK
        product: KakaoSDKShare
      - package: KakaoOpenSDK
        product: KakaoSDKTemplate
      - package: KakaoOpenSDK
        product: KakaoSDKCommon
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseMessaging
      - package: Firebase
        product: FirebaseAuth
    info:
      path: TodayTimetable/Info.plist
      properties:
        CFBundleDisplayName: "오늘시간표"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        NSAppTransportSecurity:
          NSExceptionDomains:
            openapi.1365.go.kr:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        NSSupportsLiveActivities: true
        NSCameraUsageDescription: "시간표 사진을 촬영하여 AI가 시간표를 자동 인식합니다"
        NSPhotoLibraryAddUsageDescription: "시간표 배경화면을 사진에 저장합니다"
        NSPhotoLibraryUsageDescription: "시간표 배경화면을 관리합니다"
        NSCalendarsFullAccessUsageDescription: "시험 일정을 캘린더에 추가합니다"
        NSLocationWhenInUseUsageDescription: "날씨 정보를 위해 현재 위치를 사용합니다"
        NSHealthShareUsageDescription: "활동 칼로리와 건강 데이터를 확인합니다"
        NSHealthUpdateUsageDescription: "급식 칼로리를 건강앱에 기록합니다"
        LSApplicationQueriesSchemes:
          - kakaokompassauth
          - kakaolink
          - kakaotalk
          - instagram-stories
        FacebookAppID: "2280394779158778"
        UIApplicationShortcutItems:
          - UIApplicationShortcutItemType: "timetable"
            UIApplicationShortcutItemTitle: "오늘 시간표"
            UIApplicationShortcutItemSubtitle: "오늘 뭐 배우지? 🤔"
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeDate
          - UIApplicationShortcutItemType: "meal"
            UIApplicationShortcutItemTitle: "급식 확인"
            UIApplicationShortcutItemSubtitle: "오늘 급식 뭐야?! 🍽️"
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeFavorite
          - UIApplicationShortcutItemType: "dday"
            UIApplicationShortcutItemTitle: "시험 D-Day"
            UIApplicationShortcutItemSubtitle: "현실을 직시하세요 📝"
            UIApplicationShortcutItemIconType: UIApplicationShortcutIconTypeAlarm
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - todaytimetable
              - "kakao72c9bfe604dca295eea21365904ba065"
              - "fb2280394779158778"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    entitlements:
      path: TodayTimetable/TodayTimetable.entitlements
      properties:
        com.apple.developer.healthkit: true
        com.apple.developer.family-controls: true
        aps-environment: development
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.todayschooltimetable
        com.apple.security.application-groups:
          - group.com.todayschooltimetable.app.widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todayschooltimetable.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "85"

  TodayTimetableShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - TodayTimetableShareExtension
    info:
      path: TodayTimetableShareExtension/Info.plist
      properties:
        CFBundleDisplayName: "오늘시간표"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).ShareViewController"
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1
    entitlements:
      path: TodayTimetableShareExtension/TodayTimetableShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.todayschooltimetable.app.widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todayschooltimetable.app.share
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "85"

  TodayTimetableNotificationServiceExtension:
    type: app-extension
    platform: iOS
    sources:
      - TodayTimetableNotificationServiceExtension
    info:
      path: TodayTimetableNotificationServiceExtension/Info.plist
      properties:
        CFBundleDisplayName: "오늘시간표 알림"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.usernotifications.service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).NotificationService"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todayschooltimetable.app.notificationservice
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "85"

  TodayTimetableMac:
    type: application
    platform: macOS
    scheme: {}
    sources:
      - path: TodayTimetable/Models
      - path: TodayTimetable/ViewModels
        excludes:
          - "HomeViewModel.swift"
          - "VolunteerViewModel.swift"
      - path: TodayTimetable/Services
        excludes:
          - "LiveActivityService.swift"
          - "WatchConnectivityService.swift"
          - "HealthService.swift"
          - "ShareService.swift"
          - "WallpaperService.swift"
          - "WallpaperIntent.swift"
          - "SiriIntents.swift"
          - "MealImageService.swift"
          - "TimetablePhotoService.swift"
          - "FocusService.swift"
          - "LocationService.swift"
          - "WeatherService.swift"
          - "VolunteerService.swift"
      - path: TodayTimetable/Resources
      - path: TodayTimetable/GoogleService-Info.plist
      - path: TodayTimetableMac
    dependencies:
      - target: TodayTimetableMacWidgetExtension
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFunctions
    entitlements:
      path: TodayTimetableMac/TodayTimetableMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.developer.ubiquity-kvstore-identifier: $(TeamIdentifierPrefix)com.todayschooltimetable
        com.apple.security.application-groups:
          - group.com.todayschooltimetable.app.widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todayschooltimetable.app
        PRODUCT_NAME: TodayTimetable
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_CFBundleDisplayName: "오늘시간표"
        INFOPLIST_KEY_CFBundleName: "오늘시간표"
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.education"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "64"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  TodayTimetableWatch:
    type: application
    platform: watchOS
    scheme: {}
    sources:
      - TodayTimetableWatch
    info:
      path: TodayTimetableWatch/Info.plist
      properties:
        CFBundleDisplayName: "오늘시간표"
        WKCompanionAppBundleIdentifier: com.todayschooltimetable.app
        WKApplication: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todayschooltimetable.app.watchkitapp
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "85"

  TodayTimetableLiveActivityExtension:
    type: app-extension
    platform: iOS
    sources:
      - TodayTimetableLiveActivity
    info:
      path: TodayTimetableLiveActivity/Info.plist
      properties:
        CFBundleDisplayName: "오늘시간표 Live Activity"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todayschooltimetable.app.liveactivity
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "85"

  TodayTimetableWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - TodayTimetableWidget
    info:
      path: TodayTimetableWidget/Info.plist
      properties:
        CFBundleDisplayName: "오늘시간표 위젯"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TodayTimetableWidget/TodayTimetableWidget.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.todayschooltimetable.app.widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todayschooltimetable.app.widget
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "85"
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: true

  TodayTimetableMacWidgetExtension:
    type: app-extension
    platform: macOS
    sources:
      - TodayTimetableWidget
      - path: TodayTimetable/Services/Extensions.swift
        buildPhase: sources
    info:
      path: TodayTimetableWidget/Info.plist
      properties:
        CFBundleDisplayName: "오늘시간표 위젯"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: TodayTimetableMacWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.application-groups:
          - group.com.todayschooltimetable.app.widgets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.todayschooltimetable.app.macwidget
        GENERATE_INFOPLIST_FILE: false
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "55"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: true

schemes:
  TodayTimetable:
    build:
      targets:
        TodayTimetable: all
      buildImplicitDependencies: true
      parallelizeBuild: true
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
      revealArchiveInOrganizer: true
